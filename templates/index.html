<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Comet | Watchlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>
    <div class="dashboard-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-meteor"></i> Neon Comet
            </div>
            <p>Your Personal Price Watchlist</p>
        </header>

        <!-- Add New Product Section -->
        <section class="add-product-card glass-panel">
            <h2><i class="fa-solid fa-plus-circle"></i> Add New Item</h2>
            <div class="form-row">
                <div class="input-group grow">
                    <label for="url-input">Product URL</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-link"></i>
                        <input type="url" id="url-input" placeholder="Paste product link here..." required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="target-input">Target Price</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-tag"></i>
                        <input type="number" id="target-input" placeholder="Alert below...">
                    </div>
                </div>
                <div class="input-group">
                    <label for="email-input">Notify Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email-input" placeholder="you@example.com">
                    </div>
                </div>
                <button id="add-btn" class="glow-button">
                    <i class="fa-solid fa-radar"></i> Track
                </button>
            </div>
            <p id="status-message"></p>
        </section>

        <!-- Watchlist Grid -->
        <section class="watchlist-section">
            <div class="section-header">
                <h3><i class="fa-solid fa-list-ul"></i> Your Watchlist</h3>
                <button id="refresh-btn" class="glow-button small">
                    <i class="fa-solid fa-rotate"></i> Check Prices Now
                </button>
            </div>
            <div id="product-grid" class="product-grid">
                <!-- Products will be injected here -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h3>Update Product</h3>
            <div class="input-group">
                <label for="edit-target">New Target Price</label>
                <input type="number" id="edit-target">
            </div>
            <div class="input-group">
                <label for="edit-email">New Email</label>
                <input type="email" id="edit-email">
            </div>
            <div class="modal-actions">
                <button id="cancel-edit" class="glow-button secondary">Cancel</button>
                <button id="save-edit" class="glow-button">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Template for Product Card -->
    <template id="product-card-template">
        <div class="product-card glass-panel">
            <div class="card-header">
                <h4 class="product-title">Product Title</h4>
                <div class="card-actions">
                    <button class="edit-btn"><i class="fa-solid fa-pen"></i></button>
                    <button class="delete-btn"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="card-body">
                <div class="price-row">
                    <span class="label">Current</span>
                    <span class="price current-price">₹0.00</span>
                </div>
                <div class="price-row">
                    <span class="label">Target</span>
                    <span class="price target-price">₹0.00</span>
                </div>
                <div class="meta-row">
                    <span class="last-checked">Just now</span>
                    <a href="#" target="_blank" class="visit-link">Visit <i
                            class="fa-solid fa-external-link-alt"></i></a>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" defer></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
